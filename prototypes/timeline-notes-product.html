<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="prototype-status" content="historical-reference; current visual baseline is ../timeline_notes_pixel_perfect_1920x1080_one_view.html" />
    <title>时间线笔记产品原型</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ec;
        --bg-soft: #fbf8f2;
        --surface: #fffdf8;
        --surface-muted: #f0e7da;
        --ink: #201914;
        --muted: #73675d;
        --faint: #a79888;
        --line: #e2d5c5;
        --line-strong: #cdb79f;
        --red: #b32925;
        --red-dark: #8f211f;
        --green: #2f7a65;
        --green-soft: #dcebe2;
        --brass: #a76d1f;
        --brass-soft: #efe0c1;
        --blue: #45728a;
        --purple: #7660a8;
        --shadow: 0 18px 44px rgba(59, 42, 28, 0.12);
        --small-shadow: 0 8px 24px rgba(59, 42, 28, 0.09);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(32, 25, 20, 0.025) 1px, transparent 1px) 0 0 / 22px 22px,
          linear-gradient(0deg, rgba(32, 25, 20, 0.018) 1px, transparent 1px) 0 0 / 22px 22px,
          var(--bg);
        color: var(--ink);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Noto Sans CJK SC",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 264px minmax(440px, 1fr) 430px;
      }

      .sidebar {
        min-width: 0;
        background: rgba(255, 253, 248, 0.72);
        border-right: 1px solid var(--line);
        padding: 18px 16px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        height: 38px;
      }

      .brand-main {
        display: flex;
        align-items: center;
        gap: 11px;
        min-width: 0;
      }

      .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        background: var(--red);
        color: #fffaf6;
        display: grid;
        place-items: center;
        box-shadow: 0 10px 22px rgba(179, 41, 37, 0.22);
      }

      .brand-mark svg,
      .icon svg {
        width: 17px;
        height: 17px;
      }

      .brand-title {
        display: block;
        font-size: 18px;
        font-weight: 850;
        line-height: 1.1;
      }

      .brand-caption {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }

      .icon-button {
        width: 34px;
        height: 34px;
        border-radius: 7px;
        display: inline-grid;
        place-items: center;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
      }

      .icon-button:hover {
        border-color: var(--line);
        background: var(--surface);
        color: var(--ink);
      }

      .quick-record {
        width: 100%;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-radius: var(--radius);
        padding: 0 13px;
        background: var(--red);
        color: #fffaf6;
        font-weight: 800;
        box-shadow: 0 14px 30px rgba(179, 41, 37, 0.2);
      }

      .quick-record span {
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .nav-section {
        display: grid;
        gap: 8px;
      }

      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        padding: 0 4px;
      }

      .nav-item,
      .notebook-item,
      .tag-item {
        width: 100%;
        min-height: 36px;
        display: grid;
        grid-template-columns: 20px 1fr auto;
        align-items: center;
        gap: 9px;
        border-radius: 7px;
        padding: 8px 9px;
        background: transparent;
        color: var(--muted);
        text-align: left;
        font-size: 13px;
      }

      .nav-item.active,
      .notebook-item.active {
        background: rgba(255, 253, 248, 0.92);
        color: var(--ink);
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .nav-item strong,
      .notebook-item strong,
      .tag-item strong {
        color: inherit;
        font-weight: 750;
      }

      .count {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        background: var(--line-strong);
      }

      .dot.green {
        background: var(--green);
      }

      .dot.brass {
        background: var(--brass);
      }

      .dot.blue {
        background: var(--blue);
      }

      .dot.purple {
        background: var(--purple);
      }

      .calendar {
        margin-top: auto;
        border-top: 1px solid var(--line);
        padding-top: 15px;
      }

      .calendar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 11px;
        font-size: 13px;
        font-weight: 750;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
        color: var(--muted);
        font-size: 11px;
        text-align: center;
      }

      .calendar-grid span {
        height: 24px;
        display: grid;
        place-items: center;
        border-radius: 99px;
      }

      .calendar-grid .today {
        background: var(--red);
        color: #fffaf6;
        font-weight: 800;
      }

      .workspace {
        min-width: 0;
        display: grid;
        grid-template-rows: 64px 54px minmax(0, 1fr) auto;
        border-right: 1px solid var(--line);
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(260px, 620px) auto;
        gap: 16px;
        align-items: center;
        padding: 12px 24px 10px;
      }

      .search {
        height: 40px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 12px;
        border: 1px solid var(--line);
        background: rgba(255, 253, 248, 0.84);
        border-radius: var(--radius);
        box-shadow: 0 4px 16px rgba(59, 42, 28, 0.04);
      }

      .search svg {
        width: 17px;
        height: 17px;
        color: var(--faint);
        flex: 0 0 auto;
      }

      .search input {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--ink);
        font-size: 14px;
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 9px;
      }

      .btn {
        height: 38px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 13px;
        border-radius: 7px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        font-size: 13px;
        font-weight: 760;
        white-space: nowrap;
      }

      .btn svg {
        width: 16px;
        height: 16px;
      }

      .btn.primary {
        background: var(--red);
        border-color: var(--red);
        color: #fffaf6;
      }

      .viewbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 0 24px;
      }

      .scope-title h1 {
        margin: 0;
        font-size: 21px;
        line-height: 1.2;
      }

      .scope-title p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .segmented {
        display: inline-grid;
        grid-auto-flow: column;
        gap: 4px;
        padding: 4px;
        border-radius: 7px;
        background: var(--surface-muted);
      }

      .segmented button {
        min-width: 58px;
        height: 30px;
        border-radius: 5px;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 760;
      }

      .segmented button.active {
        background: var(--surface);
        color: var(--ink);
        box-shadow: 0 2px 8px rgba(59, 42, 28, 0.09);
      }

      .timeline-feed {
        min-width: 0;
        overflow: auto;
        padding: 16px 24px 120px;
      }

      .feed-inner {
        max-width: 760px;
        margin: 0 auto;
      }

      .date-group {
        display: grid;
        grid-template-columns: 96px 34px minmax(0, 1fr);
        gap: 0;
        position: relative;
      }

      .date-group + .date-group {
        margin-top: 30px;
      }

      .date-label {
        padding-top: 8px;
        color: var(--red-dark);
      }

      .date-label strong {
        display: block;
        font-size: 22px;
        line-height: 1;
      }

      .date-label span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .rail {
        position: relative;
      }

      .rail::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: -30px;
        left: 16px;
        width: 1px;
        background: var(--line-strong);
      }

      .date-group:last-child .rail::before {
        bottom: 40px;
      }

      .pin {
        position: sticky;
        top: 12px;
        width: 13px;
        height: 13px;
        margin: 15px 0 0 10px;
        border-radius: 99px;
        background: var(--red);
        border: 3px solid var(--bg-soft);
        box-shadow: 0 0 0 1px var(--red);
        z-index: 2;
      }

      .note-stack {
        display: grid;
        gap: 14px;
      }

      .note-card {
        width: 100%;
        display: block;
        padding: 18px 18px 15px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 253, 248, 0.92);
        color: var(--ink);
        text-align: left;
        box-shadow: var(--small-shadow);
      }

      .note-card.active {
        border-color: rgba(179, 41, 37, 0.42);
        box-shadow: 0 16px 42px rgba(179, 41, 37, 0.14);
      }

      .note-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .note-card h2 {
        margin: 0;
        font-size: 20px;
        line-height: 1.25;
      }

      .note-time {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        margin-top: 4px;
      }

      .note-card p {
        margin: 11px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
      }

      .note-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 14px;
      }

      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .tag {
        min-height: 25px;
        display: inline-flex;
        align-items: center;
        border-radius: 99px;
        padding: 3px 9px;
        background: var(--surface-muted);
        color: var(--muted);
        font-size: 12px;
        font-weight: 740;
      }

      .tag.green {
        background: var(--green-soft);
        color: var(--green);
      }

      .tag.brass {
        background: var(--brass-soft);
        color: #7a4d16;
      }

      .tag.red {
        background: #f2dcd6;
        color: var(--red-dark);
      }

      .tag.blue {
        background: #dce9ee;
        color: var(--blue);
      }

      .card-actions {
        display: flex;
        gap: 7px;
        color: var(--muted);
      }

      .floating-composer {
        position: sticky;
        bottom: 0;
        z-index: 8;
        padding: 0 24px 18px;
        pointer-events: none;
      }

      .composer-box {
        max-width: 760px;
        height: 72px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 253, 248, 0.94);
        box-shadow: var(--shadow);
        pointer-events: auto;
      }

      .composer-box input {
        min-width: 0;
        height: 42px;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--ink);
        font-size: 14px;
      }

      .composer-tools {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .send {
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        border-radius: 99px;
        background: var(--red);
        color: #fffaf6;
      }

      .editor {
        min-width: 0;
        background: rgba(255, 253, 248, 0.78);
        display: grid;
        grid-template-rows: 64px minmax(0, 1fr);
      }

      .editor-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--line);
      }

      .editor-nav,
      .editor-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .editor-body {
        overflow: auto;
        padding: 22px 24px 36px;
      }

      .editor-title {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--ink);
        font-size: 30px;
        font-weight: 850;
        line-height: 1.2;
        margin-bottom: 12px;
      }

      .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        align-items: center;
        color: var(--muted);
        font-size: 13px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      .meta-item {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }

      .editor-card {
        margin-top: 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface);
      }

      .formatbar {
        height: 42px;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
        background: rgba(247, 243, 236, 0.76);
      }

      .formatbar button {
        width: 31px;
        height: 30px;
        border-radius: 6px;
        display: grid;
        place-items: center;
        background: transparent;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .formatbar button:hover {
        background: var(--surface);
        color: var(--ink);
      }

      .editor-text {
        width: 100%;
        min-height: 310px;
        resize: vertical;
        border: 0;
        outline: 0;
        background: transparent;
        padding: 18px;
        color: var(--ink);
        font-size: 15px;
        line-height: 1.8;
      }

      .side-section {
        margin-top: 20px;
      }

      .side-section h3 {
        margin: 0 0 10px;
        font-size: 14px;
      }

      .attachment-list,
      .related-list {
        display: grid;
        gap: 8px;
      }

      .attachment,
      .related-date {
        min-height: 42px;
        display: grid;
        grid-template-columns: 26px 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface);
        color: var(--ink);
        font-size: 13px;
      }

      .attachment span,
      .related-date span {
        color: var(--muted);
        font-size: 12px;
      }

      .file-icon {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        display: grid;
        place-items: center;
        background: var(--green-soft);
        color: var(--green);
      }

      .saved-state {
        color: var(--green);
        font-size: 12px;
        font-weight: 800;
      }

      @media (max-width: 1200px) {
        .app-shell {
          grid-template-columns: 228px minmax(0, 1fr);
        }

        .editor {
          grid-column: 1 / -1;
          border-top: 1px solid var(--line);
          grid-template-rows: 58px auto;
        }

        .editor-body {
          display: grid;
          grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
          gap: 20px;
        }

        .editor-main {
          min-width: 0;
        }
      }

      @media (max-width: 820px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          position: sticky;
          top: 0;
          z-index: 20;
          padding: 12px 14px;
          gap: 10px;
          background: rgba(255, 253, 248, 0.94);
          backdrop-filter: blur(10px);
        }

        .sidebar > nav.nav-section {
          display: flex;
          gap: 8px;
          overflow-x: auto;
          padding-bottom: 2px;
        }

        .sidebar > section.nav-section {
          display: none;
        }

        .nav-item {
          min-width: 118px;
          grid-template-columns: 18px 1fr auto;
          padding: 8px;
        }

        .quick-record {
          height: 38px;
        }

        .calendar {
          display: none;
        }

        .workspace {
          border-right: 0;
          grid-template-rows: auto auto minmax(0, 1fr) auto;
        }

        .topbar,
        .viewbar {
          grid-template-columns: 1fr;
          padding-left: 16px;
          padding-right: 16px;
        }

        .topbar {
          display: grid;
        }

        .actions,
        .viewbar {
          justify-content: start;
        }

        .timeline-feed {
          padding-left: 14px;
          padding-right: 14px;
        }

        .date-group {
          grid-template-columns: 70px 26px minmax(0, 1fr);
        }

        .date-label strong {
          font-size: 18px;
        }

        .note-card h2 {
          font-size: 18px;
        }

        .floating-composer {
          padding-left: 14px;
          padding-right: 14px;
        }

        .composer-box {
          grid-template-columns: 1fr auto;
          height: auto;
        }

        .composer-tools {
          grid-column: 1 / -1;
          justify-content: space-between;
        }

        .editor-body {
          display: block;
          padding: 18px 16px 30px;
        }

        .editor-title {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="brand">
          <div class="brand-main">
            <div class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 6h10M7 12h10M7 18h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </div>
            <div>
              <span class="brand-title">时间线笔记</span>
              <span class="brand-caption">按时间整理想法和事件</span>
            </div>
          </div>
          <button class="icon-button" type="button" aria-label="菜单">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M5 7h14M5 12h14M5 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </header>

        <button class="quick-record" type="button" id="quickRecord">
          <span>
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            快速记录
          </span>
          <span>Ctrl N</span>
        </button>

        <nav class="nav-section" aria-label="主要筛选">
          <button class="nav-item active" type="button" data-filter="全部笔记">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none"><path d="M7 4h10a2 2 0 0 1 2 2v14l-3-2-3 2-3-2-3 2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" /></svg>
            </span>
            <strong>全部笔记</strong>
            <span class="count">128</span>
          </button>
          <button class="nav-item" type="button" data-filter="今天">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none"><path d="M7 3v3m10-3v3M4 9h16M6 5h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" /></svg>
            </span>
            <strong>今天</strong>
            <span class="count">8</span>
          </button>
          <button class="nav-item" type="button" data-filter="本周">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none"><path d="M5 7h14M8 3v4m8-4v4M6 5h12a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm3 8h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" /></svg>
            </span>
            <strong>本周</strong>
            <span class="count">26</span>
          </button>
          <button class="nav-item" type="button" data-filter="收藏">
            <span class="icon">
              <svg viewBox="0 0 24 24" fill="none"><path d="m12 4 2.3 4.7 5.2.8-3.8 3.7.9 5.2-4.6-2.5-4.6 2.5.9-5.2-3.8-3.7 5.2-.8L12 4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" /></svg>
            </span>
            <strong>收藏</strong>
