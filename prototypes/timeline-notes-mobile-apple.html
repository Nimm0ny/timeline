<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="prototype-status" content="historical-reference; current visual baseline is ../timeline_notes_pixel_perfect_1920x1080_one_view.html" />
    <title>时间线笔记移动端 Apple 风原型</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f4ed;
        --bg-warm: #fffaf2;
        --surface: rgba(255, 253, 248, 0.92);
        --surface-solid: #fffdf8;
        --surface-raised: #ffffff;
        --ink: #1d1d1f;
        --muted: #6e6a64;
        --faint: #a79c90;
        --line: rgba(117, 92, 68, 0.18);
        --line-strong: rgba(117, 92, 68, 0.28);
        --red: #b72420;
        --red-dark: #941f1d;
        --green: #2f7b67;
        --green-soft: #dff0e7;
        --brass: #a56c21;
        --brass-soft: #f1e0c3;
        --blue: #3f7893;
        --blue-soft: #dfedf2;
        --shadow: 0 20px 50px rgba(54, 34, 20, 0.13);
        --soft-shadow: 0 10px 28px rgba(54, 34, 20, 0.1);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --tab-height: 78px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at 12% 0%, rgba(183, 36, 32, 0.06), transparent 25%),
          radial-gradient(circle at 88% 12%, rgba(47, 123, 103, 0.07), transparent 28%),
          var(--bg);
        color: var(--ink);
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Display",
          "SF Pro Text",
          "PingFang SC",
          "Microsoft YaHei",
          system-ui,
          sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .phone {
        width: 100%;
        min-height: 100vh;
        margin: 0 auto;
        background:
          linear-gradient(90deg, rgba(29, 29, 31, 0.024) 1px, transparent 1px) 0 0 / 22px 22px,
          linear-gradient(0deg, rgba(29, 29, 31, 0.018) 1px, transparent 1px) 0 0 / 22px 22px,
          var(--bg-warm);
        position: relative;
        overflow-x: hidden;
      }

      .app {
        min-height: 100vh;
        padding-bottom: calc(var(--tab-height) + env(safe-area-inset-bottom));
      }

      .status {
        height: calc(14px + env(safe-area-inset-top));
      }

      .nav {
        position: sticky;
        top: 0;
        z-index: 20;
        padding: 8px 18px 12px;
        background: rgba(255, 250, 242, 0.76);
        backdrop-filter: blur(20px) saturate(1.35);
        border-bottom: 1px solid rgba(117, 92, 68, 0.08);
      }

      .nav-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .nav-title {
        min-width: 0;
      }

      .nav-title h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.05;
        font-weight: 800;
        letter-spacing: 0;
      }

      .nav-title p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.2;
      }

      .icon-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        display: inline-grid;
        place-items: center;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .icon-btn.red {
        background: var(--red);
        color: #fffaf6;
        box-shadow: 0 10px 22px rgba(183, 36, 32, 0.22);
      }

      svg {
        width: 18px;
        height: 18px;
      }

      .search {
        height: 42px;
        margin-top: 16px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 13px;
        border-radius: 999px;
        background: rgba(235, 228, 218, 0.72);
        color: var(--muted);
      }

      .search input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--ink);
        font-size: 16px;
      }

      .toolbar {
        padding: 14px 18px 8px;
      }

      .segmented {
        height: 42px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 3px;
        padding: 3px;
        border-radius: 999px;
        background: rgba(235, 228, 218, 0.86);
      }

      .segmented button {
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      .segmented button.active {
        background: rgba(255, 253, 248, 0.96);
        color: var(--ink);
        box-shadow: 0 2px 8px rgba(54, 34, 20, 0.12);
      }

      .scope-strip {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        overflow-x: auto;
        scrollbar-width: none;
        padding-bottom: 2px;
      }

      .scope-strip::-webkit-scrollbar {
        display: none;
      }

      .scope {
        flex: 0 0 auto;
        min-width: 92px;
        min-height: 60px;
        display: grid;
        align-content: center;
        gap: 4px;
        padding: 10px 12px;
        border-radius: 18px;
        background: var(--surface);
        color: var(--muted);
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .scope strong {
        color: var(--ink);
        font-size: 15px;
      }

      .scope span {
        font-size: 12px;
        font-weight: 650;
      }

      .scope.active {
        background: var(--red);
        color: #fffaf6;
        box-shadow: 0 14px 28px rgba(183, 36, 32, 0.18);
      }

      .scope.active strong,
      .scope.active span {
        color: #fffaf6;
      }

      .today-card {
        margin: 10px 18px 8px;
        padding: 16px;
        border-radius: var(--radius-lg);
        background:
          linear-gradient(135deg, rgba(183, 36, 32, 0.08), transparent 44%),
          var(--surface);
        box-shadow: var(--soft-shadow), inset 0 0 0 1px var(--line);
      }

      .today-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .today-head span {
        color: var(--red-dark);
        font-size: 13px;
        font-weight: 800;
      }

      .today-card h2 {
        margin: 8px 0 0;
        font-size: 24px;
        line-height: 1.12;
      }

      .today-card p {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .quick {
        width: 100%;
        height: 44px;
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 999px;
        background: var(--red);
        color: #fffaf6;
        font-size: 15px;
        font-weight: 800;
      }

      .feed {
        padding: 12px 18px 108px;
      }

      .month-title {
        display: flex;
        align-items: end;
        justify-content: space-between;
        margin: 10px 0 12px;
      }

      .month-title h2 {
        margin: 0;
        font-size: 22px;
        line-height: 1;
      }

      .month-title span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .timeline {
        position: relative;
      }

      .timeline::before {
        content: "";
        position: absolute;
        top: 8px;
        bottom: 0;
        left: 24px;
        width: 2px;
        border-radius: 999px;
        background: linear-gradient(var(--red), rgba(183, 36, 32, 0.16));
      }

      .item {
        display: grid;
        grid-template-columns: 50px minmax(0, 1fr);
        gap: 10px;
        position: relative;
      }

      .item + .item {
        margin-top: 18px;
      }

      .date {
        padding-top: 8px;
        text-align: center;
        z-index: 2;
      }

      .date strong {
        display: grid;
        place-items: center;
        width: 50px;
        height: 50px;
        border-radius: 18px;
        background: var(--surface-solid);
        color: var(--red-dark);
        font-size: 18px;
        box-shadow: inset 0 0 0 1px var(--line), 0 6px 18px rgba(54, 34, 20, 0.08);
      }

      .date span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
      }

      .note {
        width: 100%;
        padding: 16px;
        border-radius: var(--radius-lg);
        background: var(--surface);
        color: var(--ink);
        text-align: left;
        box-shadow: var(--soft-shadow), inset 0 0 0 1px var(--line);
        backdrop-filter: blur(18px) saturate(1.2);
      }

      .note.active {
        box-shadow:
          0 18px 38px rgba(183, 36, 32, 0.13),
          inset 0 0 0 1.5px rgba(183, 36, 32, 0.38);
      }

      .note-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }

      .note h3 {
        margin: 0;
        font-size: 20px;
        line-height: 1.22;
        font-weight: 800;
      }

      .note-time {
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.2;
      }

      .star {
        color: #f2a51f;
        font-size: 19px;
        line-height: 1;
      }

      .note p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .chip {
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 9px;
        border-radius: 999px;
        background: rgba(235, 228, 218, 0.72);
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .chip.green {
        background: var(--green-soft);
        color: var(--green);
      }

      .chip.brass {
        background: var(--brass-soft);
        color: var(--brass);
      }

      .chip.blue {
        background: var(--blue-soft);
        color: var(--blue);
      }

      .tabbar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        height: calc(var(--tab-height) + env(safe-area-inset-bottom));
        padding: 8px 18px calc(8px + env(safe-area-inset-bottom));
        background: rgba(255, 250, 242, 0.74);
        border-top: 1px solid rgba(117, 92, 68, 0.12);
        backdrop-filter: blur(22px) saturate(1.35);
      }

      .tabs {
        height: 62px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        align-items: center;
      }

      .tab {
        height: 58px;
        display: grid;
        place-items: center;
        gap: 3px;
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .tab svg {
        width: 22px;
        height: 22px;
      }

      .tab.active {
        color: var(--red);
      }

      .fab {
        position: fixed;
        right: 22px;
        bottom: calc(var(--tab-height) + 18px + env(safe-area-inset-bottom));
        z-index: 32;
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: var(--red);
        color: #fffaf6;
        box-shadow: 0 18px 36px rgba(183, 36, 32, 0.28);
      }

      .sheet-backdrop {
        position: fixed;
        inset: 0;
        z-index: 40;
        background: rgba(0, 0, 0, 0.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      .sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 41;
        padding: 10px 14px calc(14px + env(safe-area-inset-bottom));
        border-radius: 28px 28px 0 0;
        background: rgba(255, 253, 248, 0.96);
        box-shadow: 0 -20px 50px rgba(54, 34, 20, 0.18);
        backdrop-filter: blur(24px) saturate(1.35);
        transform: translateY(105%);
        transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .sheet.open {
        transform: translateY(0);
      }

      .sheet-backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      .grabber {
        width: 42px;
        height: 5px;
        margin: 0 auto 14px;
        border-radius: 999px;
        background: rgba(29, 29, 31, 0.18);
      }

      .sheet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .sheet-head h2 {
        margin: 0;
        font-size: 22px;
        line-height: 1.15;
      }

      .sheet-form {
        display: grid;
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }

      .field input,
      .field textarea {
        width: 100%;
        border: 0;
        outline: 0;
        border-radius: 16px;
        background: rgba(235, 228, 218, 0.58);
        color: var(--ink);
        padding: 13px 14px;
        font-size: 16px;
      }

      .field textarea {
        min-height: 128px;
        resize: vertical;
        line-height: 1.55;
      }

      .sheet-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 2px;
      }

      .sheet-btn {
        height: 48px;
        border-radius: 999px;
        background: rgba(235, 228, 218, 0.72);
        color: var(--ink);
        font-size: 16px;
        font-weight: 800;
      }

      .sheet-btn.primary {
        background: var(--red);
        color: #fffaf6;
      }

      @media (min-width: 520px) {
        body {
          display: grid;
          place-items: center;
          padding: 28px 0;
        }

        .phone {
          width: 390px;
          min-height: 844px;
          max-height: 844px;
          overflow-y: auto;
          border-radius: 44px;
          box-shadow: 0 30px 80px rgba(54, 34, 20, 0.22);
        }

        .tabbar,
        .fab,
        .sheet,
        .sheet-backdrop {
          left: 50%;
          right: auto;
          width: 390px;
          transform: translateX(-50%);
        }

        .sheet {
          transform: translate(-50%, 105%);
        }

        .sheet.open {
          transform: translate(-50%, 0);
        }

        .fab {
          margin-left: 137px;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="时间线笔记移动端原型">
      <div class="app">
        <div class="status"></div>
        <header class="nav">
          <div class="nav-top">
            <div class="nav-title">
              <h1 id="pageTitle">时间线</h1>
              <p id="pageSubtitle">按时间整理笔记和事件</p>
            </div>
            <div class="icon-row">
              <button class="icon-btn" type="button" aria-label="更多">
                <svg viewBox="0 0 24 24" fill="none"><path d="M5 7h14M5 12h14M5 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
              </button>
              <button class="icon-btn red" type="button" id="topAdd" aria-label="添加时间点">
                <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" /></svg>
              </button>
            </div>
          </div>
          <label class="search" aria-label="搜索笔记">
            <svg viewBox="0 0 24 24" fill="none"><path d="m21 21-4.2-4.2m1.2-5.3a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
            <input type="search" placeholder="搜索笔记、年份、标签" />
          </label>
        </header>

        <section class="toolbar" aria-label="筛选与时间粒度">
          <div class="segmented" role="group" aria-label="时间粒度">
            <button class="active" type="button" data-view="年">年</button>
            <button type="button" data-view="月">月</button>
            <button type="button" data-view="日">日</button>
            <button type="button" data-view="全部">全部</button>
          </div>
          <div class="scope-strip" aria-label="笔记本筛选">
            <button class="scope active" type="button" data-scope="全部笔记">
              <strong>全部笔记</strong>
              <span>128 条</span>
            </button>
            <button class="scope" type="button" data-scope="历史学习">
              <strong>历史学习</strong>
              <span>48 条</span>
            </button>
            <button class="scope" type="button" data-scope="项目日志">
              <strong>项目日志</strong>
              <span>36 条</span>
            </button>
            <button class="scope" type="button" data-scope="收藏">
              <strong>收藏</strong>
              <span>12 条</span>
            </button>
          </div>
        </section>

        <section class="today-card">
          <div class="today-head">
            <span>今天 20:46</span>
            <span>3 条待整理</span>
          </div>
          <h2>快速记录新的时间点</h2>
          <p>把想法、事件、学习片段先放进时间线，稍后再补充正文和标签。</p>
          <button class="quick" type="button" id="quickAdd">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" /></svg>
            快速记录
          </button>
        </section>

        <section class="feed" aria-label="时间线笔记流">
          <div class="month-title">
            <h2>历史学习</h2>
            <span id="viewLabel">按年份</span>
          </div>

          <div class="timeline">
            <article class="item">
              <div class="date">
                <strong>1840</strong>
                <span>6月</span>
              </div>
              <button class="note active" type="button" data-note="0">
                <span class="note-top">
                  <span>
                    <h3>1840 鸦片战争</h3>
                    <span class="note-time">1840 年 6 月 - 1842 年 8 月</span>
                  </span>
                  <span class="star">☆</span>
                </span>
                <p>整理战争背景、关键节点和《南京条约》影响，作为近代史学习的起点。</p>
                <span class="chips">
                  <span class="chip green">历史学习</span>
                  <span class="chip">事件</span>
                </span>
              </button>
            </article>

            <article class="item">
              <div class="date">
                <strong>1911</strong>
                <span>10月</span>
              </div>
              <button class="note" type="button" data-note="1">
                <span class="note-top">
                  <span>
                    <h3>1911 辛亥革命</h3>
                    <span class="note-time">1911 年 10 月 10 日</span>
                  </span>
                  <span class="star">★</span>
                </span>
                <p>梳理武昌起义、清朝终结和共和制度建立，补充课堂提纲与人物关系。</p>
                <span class="chips">
                  <span class="chip green">历史学习</span>
                  <span class="chip brass">里程碑</span>
                </span>
              </button>
            </article>

            <article class="item">
              <div class="date">
                <strong>1949</strong>
                <span>10月</span>
              </div>
              <button class="note" type="button" data-note="2">
                <span class="note-top">
                  <span>
                    <h3>1949 新中国成立</h3>
                    <span class="note-time">1949 年 10 月 1 日</span>
                  </span>
                  <span class="star">☆</span>
                </span>
                <p>记录开国大典、政权建立和中国社会进入新阶段的核心结论。</p>
                <span class="chips">
                  <span class="chip green">历史学习</span>
                  <span class="chip brass">里程碑</span>
                </span>
              </button>
            </article>

            <article class="item">
              <div class="date">
                <strong>今天</strong>
                <span>09:30</span>
              </div>
              <button class="note" type="button" data-note="3">
                <span class="note-top">
                  <span>
                    <h3>项目日志：移动端原型</h3>
                    <span class="note-time">2024 年 5 月 20 日</span>
                  </span>
                  <span class="star">☆</span>
                </span>
                <p>移动端以时间流为主，新增和编辑都收进底部面板，减少页面跳转。</p>
                <span class="chips">
                  <span class="chip brass">项目日志</span>
                  <span class="chip blue">产品</span>
                </span>
              </button>
            </article>
          </div>
        </section>
      </div>

      <button class="fab" type="button" id="fabAdd" aria-label="添加时间点">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" /></svg>
      </button>

      <nav class="tabbar" aria-label="底部导航">
        <div class="tabs">
          <button class="tab active" type="button" data-tab="时间线">
            <svg viewBox="0 0 24 24" fill="none"><path d="M6 4v16m0-12h9a3 3 0 0 1 0 6H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
            <span>时间线</span>
          </button>
          <button class="tab" type="button" data-tab="笔记">
            <svg viewBox="0 0 24 24" fill="none"><path d="M7 4h10a2 2 0 0 1 2 2v14l-3-2-3 2-3-2-3 2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" /></svg>
            <span>笔记</span>
          </button>
          <button class="tab" type="button" data-tab="日历">
            <svg viewBox="0 0 24 24" fill="none"><path d="M7 3v3m10-3v3M4 9h16M6 5h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
            <span>日历</span>
          </button>
          <button class="tab" type="button" data-tab="我的">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm7 8a7 7 0 0 0-14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
            <span>我的</span>
          </button>
        </div>
      </nav>

      <div class="sheet-backdrop" id="sheetBackdrop"></div>
      <section class="sheet" id="composeSheet" aria-label="新增时间点">
        <div class="grabber"></div>
        <header class="sheet-head">
          <h2 id="sheetTitle">添加时间点</h2>
          <button class="icon-btn" type="button" id="closeSheet" aria-label="关闭">
            <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
          </button>
        </header>
        <form class="sheet-form">
          <div class="field">
            <label for="noteTitle">标题</label>
            <input id="noteTitle" value="1840 鸦片战争" />
          </div>
          <div class="field">
            <label for="noteDate">时间</label>
            <input id="noteDate" value="1840 年 6 月 - 1842 年 8 月" />
          </div>
          <div class="field">
            <label for="noteText">笔记</label>
            <textarea id="noteText">整理战争背景、关键节点和《南京条约》影响，作为近代史学习的起点。</textarea>
          </div>
          <div class="sheet-actions">
            <button class="sheet-btn" type="button" id="cancelSheet">取消</button>
            <button class="sheet-btn primary" type="button" id="saveSheet">保存</button>
          </div>
        </form>
      </section>
    </main>

    <script>
      const notes = [
        {
          title: "1840 鸦片战争",
          date: "1840 年 6 月 - 1842 年 8 月",
          text: "整理战争背景、关键节点和《南京条约》影响，作为近代史学习的起点。",
        },
        {
          title: "1911 辛亥革命",
          date: "1911 年 10 月 10 日",
          text: "梳理武昌起义、清朝终结和共和制度建立，补充课堂提纲与人物关系。",
        },
        {
          title: "1949 新中国成立",
          date: "1949 年 10 月 1 日",
          text: "记录开国大典、政权建立和中国社会进入新阶段的核心结论。",
        },
        {
          title: "项目日志：移动端原型",
          date: "2024 年 5 月 20 日",
          text: "移动端以时间流为主，新增和编辑都收进底部面板，减少页面跳转。",
        },
      ];

      const sheet = document.querySelector("#composeSheet");
      const backdrop = document.querySelector("#sheetBackdrop");
      const titleInput = document.querySelector("#noteTitle");
      const dateInput = document.querySelector("#noteDate");
      const textInput = document.querySelector("#noteText");
      const sheetTitle = document.querySelector("#sheetTitle");

      function openSheet(mode, noteIndex = 0) {
        const note = notes[noteIndex] || notes[0];
        sheetTitle.textContent = mode === "new" ? "添加时间点" : "编辑时间点";
        titleInput.value = mode === "new" ? "" : note.title;
        dateInput.value = mode === "new" ? "今天" : note.date;
        textInput.value = mode === "new" ? "" : note.text;
        sheet.classList.add("open");
        backdrop.classList.add("open");
        setTimeout(() => titleInput.focus(), 80);
      }

      function closeSheet() {
        sheet.classList.remove("open");
        backdrop.classList.remove("open");
      }

      document.querySelectorAll(".note").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".note").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          openSheet("edit", Number(button.dataset.note));
        });
      });

      document.querySelectorAll("#topAdd, #quickAdd, #fabAdd").forEach((button) => {
        button.addEventListener("click", () => openSheet("new"));
      });

      document.querySelectorAll("#closeSheet, #cancelSheet, #saveSheet, #sheetBackdrop").forEach((item) => {
        item.addEventListener("click", closeSheet);
      });

      document.querySelectorAll("[data-view]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-view]").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          document.querySelector("#viewLabel").textContent = `按${button.dataset.view}`;
        });
      });

      document.querySelectorAll("[data-scope]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-scope]").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          document.querySelector(".month-title h2").textContent = button.dataset.scope;
        });
      });

      document.querySelectorAll("[data-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-tab]").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          document.querySelector("#pageTitle").textContent = button.dataset.tab;
          document.querySelector("#pageSubtitle").textContent =
            button.dataset.tab === "时间线" ? "按时间整理笔记和事件" : "移动端原型占位视图";
        });
      });
    </script>
  </body>
</html>
